<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FinancePerson</title>
  <link rel="stylesheet" href="styles.css?v=20260407-2118" />
</head>
<body class="auth-mode">
  <section id="auth-view" class="container auth-layout">
    <section class="auth-stage">
      <div class="auth-brand auth-brand-outside">
        <img src="logo-financeperson.svg" alt="Logo FinancePerson" class="auth-logo" />
        <strong class="auth-brand-name">FinancePerson</strong>
      </div>
      <section class="auth-login-card">
        <h2 id="auth-card-title">Login</h2>
        <form id="login-form" class="auth-form">
          <label class="auth-field">
            <input id="login-username" type="text" placeholder="Digite seu usuário" required />
          </label>
          <label class="auth-field">
            <input id="login-password" type="password" placeholder="Digite sua senha" required />
          </label>
          <button type="submit" class="auth-submit">Continuar</button>
        </form>
        <p id="auth-status" class="list-meta auth-status"></p>
      </section>
    </section>
  </section>

  <script type="module" src="/auth.js"></script>
</body>
</html>
