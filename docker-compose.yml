services:
  app-financas:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 80
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      APP_STATE_PREFIX: ${APP_STATE_PREFIX:-financeperson:state:v1:}
      APP_AUTH_USERS: ${APP_AUTH_USERS:-[{"username":"wellington","password":"change-me"}]}
    ports:
      - "8080:80"
    restart: unless-stopped
